services:
  - type: web
    name: quiz-web-backend
    env: node
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        value: your-aiven-mysql-host.aivencloud.com
      - key: DB_PORT
        value: 26705
      - key: DB_USER
        value: avnadmin
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: defaultdb
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

